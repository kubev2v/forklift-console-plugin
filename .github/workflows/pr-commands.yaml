name: PR Commands

on:
  # Slash commands via comments
  issue_comment:
    types: [created]

  # GitHub native review approval
  pull_request_review:
    types: [submitted]

jobs:
  # ─── Handle /lgtm and /approve comments ───
  handle-approval-commands:
    name: Handle approval commands
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (
        contains(github.event.comment.body, '/lgtm') ||
        contains(github.event.comment.body, '/approve')
      ) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)

    steps:
      - name: Add approved label
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            const commenter = context.payload.comment.user.login;
            const APPROVED_LABEL = 'approved';

            core.info(`Processing approval command from ${commenter} on PR #${prNumber}`);

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({ owner, repo, name: APPROVED_LABEL });
            } catch {
              await github.rest.issues.createLabel({
                owner, repo, name: APPROVED_LABEL, color: '0e8a16',
                description: 'PR is approved and eligible for auto-merge'
              });
            }

            await github.rest.issues.addLabels({
              owner, repo, issue_number: prNumber, labels: [APPROVED_LABEL]
            });

            // Also submit a GitHub review approval for visibility
            try {
              await github.rest.pulls.createReview({
                owner, repo, pull_number: prNumber,
                event: 'APPROVE',
                body: `Approved via \`${context.payload.comment.body.trim().split(/\s/)[0]}\` by @${commenter}`
              });
            } catch (err) {
              core.info(`Could not submit review (may already be approved): ${err.message}`);
            }

            await github.rest.reactions.createForIssueComment({
              owner, repo, comment_id: context.payload.comment.id, content: '+1'
            });

            core.info(`Added '${APPROVED_LABEL}' label to PR #${prNumber}`);

  # ─── Handle GitHub native review approvals ───
  handle-review-approval:
    name: Handle review approval
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)

    steps:
      - name: Add approved label from review
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const reviewer = context.payload.review.user.login;
            const APPROVED_LABEL = 'approved';

            core.info(`Processing GitHub review approval from ${reviewer} on PR #${prNumber}`);

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({ owner, repo, name: APPROVED_LABEL });
            } catch {
              await github.rest.issues.createLabel({
                owner, repo, name: APPROVED_LABEL, color: '0e8a16',
                description: 'PR is approved and eligible for auto-merge'
              });
            }

            await github.rest.issues.addLabels({
              owner, repo, issue_number: prNumber, labels: [APPROVED_LABEL]
            });

            core.info(`Added '${APPROVED_LABEL}' label to PR #${prNumber}`);

  # ─── Handle /retest-gh command (GitHub Actions only) ───
  # NOTE: `/retest` without suffix is reserved for Red Hat Konflux (Pipelines as Code).
  #       PaC natively intercepts `/retest` comments to re-trigger Tekton PipelineRuns.
  #       Use `/retest-gh` to re-run only GitHub Actions workflows.
  #       Use `/retest-all` to re-run GitHub Actions AND reset the auto-merge retry counter
  #       (Konflux pipelines are always re-triggered by PaC on `/retest-all` since it contains `/retest`).
  handle-retest:
    name: Handle retest command
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      issues: write
      actions: write
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (
        contains(github.event.comment.body, '/retest-gh') ||
        contains(github.event.comment.body, '/retest-all')
      ) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)

    steps:
      - name: Retest PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            const commenter = context.payload.comment.user.login;
            const RETRY_LABEL_PREFIX = 'auto-merge/retry-';

            core.info(`Processing retest from ${commenter} on PR #${prNumber}`);

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            // Reset auto-merge retry labels
            const labels = pr.labels.map(l => l.name);
            for (const label of labels) {
              if (label.startsWith(RETRY_LABEL_PREFIX)) {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: prNumber, name: label
                }).catch(() => {});
              }
            }

            // Re-run failed GitHub Actions workflow runs
            const { data: workflowRuns } = await github.rest.actions.listWorkflowRunsForRepo({
              owner, repo, head_sha: pr.head.sha, per_page: 100
            });

            let rerunCount = 0;
            for (const run of workflowRuns.workflow_runs) {
              if (run.conclusion === 'failure' || run.conclusion === 'timed_out' || run.conclusion === 'cancelled') {
                try {
                  await github.rest.actions.reRunWorkflow({ owner, repo, run_id: run.id });
                  core.info(`Re-ran workflow run ${run.id} (${run.name})`);
                  rerunCount++;
                } catch (err) {
                  core.warning(`Failed to re-run workflow ${run.id}: ${err.message}`);
                }
              }
            }

            await github.rest.reactions.createForIssueComment({
              owner, repo, comment_id: context.payload.comment.id, content: 'rocket'
            });

            const comment = context.payload.comment.body.trim();
            const isAll = comment.includes('/retest-all');

            if (rerunCount > 0) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: [
                  `🔄 **Retest triggered** by @${commenter} — re-running ${rerunCount} GitHub Actions workflow(s). Retry counter has been reset.`,
                  isAll ? '> Konflux pipelines will also be re-triggered by Pipelines as Code.' : ''
                ].filter(Boolean).join('\n')
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: [
                  `✅ **Retest requested** by @${commenter} — no failed GitHub Actions workflows found to re-run.`,
                  isAll ? '> Konflux pipelines will also be re-triggered by Pipelines as Code.' : ''
                ].filter(Boolean).join('\n')
              });
            }

  # ─── Handle /hold and /unhold commands ───
  handle-hold:
    name: Handle hold commands
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (
        contains(github.event.comment.body, '/hold') ||
        contains(github.event.comment.body, '/unhold')
      ) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)

    steps:
      - name: Toggle hold
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            const comment = context.payload.comment.body.trim();
            const HOLD_LABEL = 'do-not-merge/hold';

            // Determine whether this is /hold or /unhold
            // /unhold must be checked first since /hold is a substring of /unhold
            const isUnhold = comment.includes('/unhold');

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({ owner, repo, name: HOLD_LABEL });
            } catch {
              await github.rest.issues.createLabel({
                owner, repo, name: HOLD_LABEL, color: 'e11d48',
                description: 'PR is on hold and should not be merged'
              });
            }

            if (isUnhold) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: prNumber, name: HOLD_LABEL
                });
                core.info(`Removed '${HOLD_LABEL}' from PR #${prNumber}`);
              } catch {
                core.info(`Label '${HOLD_LABEL}' was not present on PR #${prNumber}`);
              }
            } else {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: prNumber, labels: [HOLD_LABEL]
              });
              core.info(`Added '${HOLD_LABEL}' to PR #${prNumber}`);
            }

            await github.rest.reactions.createForIssueComment({
              owner, repo, comment_id: context.payload.comment.id, content: '+1'
            });
